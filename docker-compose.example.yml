services:
    okv2:
        build: .
        container_name: okv2
        restart: unless-stopped
        ports:
            - '7000:7000'
        environment:
            PORT: 7000
            ADMIN_USER: admin
            ADMIN_PASS: admin
            PUBLIC_URL: https://example.com/
            DEPLOY_CMD: 'rm -r /www/example.com/; cp -r dist/ /www/example.com/'
            NODE_OPTIONS: '--openssl-legacy-provider'
        volumes:
            - .:/app
